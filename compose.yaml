name: go-ledger-event-processor

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ledger_processor
      POSTGRES_USER: processor
      POSTGRES_PASSWORD: processor
    ports:
      - "5434:5432"
    volumes:
      - go_ledger_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U processor -d ledger_processor"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: app
    ports:
      - "5674:5672"
      - "15674:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  go_ledger_postgres_data:
