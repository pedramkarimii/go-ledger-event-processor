name: go-ledger-event-processor

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ledger_processor
      POSTGRES_USER: processor
      POSTGRES_PASSWORD: processor
    ports:
      - "5434:5432"
    volumes:
      - go_ledger_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U processor -d ledger_processor"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: app
    ports:
      - "5674:5672"
      - "15674:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    command: ["/app/api"]
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://processor:processor@postgres:5432/ledger_processor?sslmode=disable
      RABBITMQ_URL: amqp://app:app@rabbitmq:5672/
      RABBITMQ_EXCHANGE: crypto.ledger.events
      RABBITMQ_QUEUE: go-ledger-order-projections
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  consumer:
    build: .
    command: ["/app/consumer"]
    environment:
      CONSUMER_METRICS_ADDR: :8081
      DATABASE_URL: postgres://processor:processor@postgres:5432/ledger_processor?sslmode=disable
      RABBITMQ_URL: amqp://app:app@rabbitmq:5672/
      RABBITMQ_EXCHANGE: crypto.ledger.events
      RABBITMQ_QUEUE: go-ledger-order-projections
    ports:
      - "8085:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  go_ledger_postgres_data:
