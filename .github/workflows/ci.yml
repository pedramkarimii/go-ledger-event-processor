name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Go quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))"
      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  end-to-end:
    name: Docker end-to-end
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
      - name: Validate Docker Compose
        run: docker compose config
      - name: Start stack
        run: docker compose up -d --build
      - name: Wait for API readiness, consumer metrics, and RabbitMQ topology
        run: |
          set -euo pipefail

          for attempt in {1..45}; do
            api_health="$(curl --fail --silent http://localhost:8084/health || true)"
            api_ready="$(curl --fail --silent http://localhost:8084/ready || true)"
            consumer_metrics="$(curl --fail --silent http://localhost:8085/metrics || true)"
            projection_queue="$(curl --fail --silent -u app:app http://localhost:15674/api/queues/%2F/go-ledger-order-projections || true)"
            dead_letter_queue="$(curl --fail --silent -u app:app http://localhost:15674/api/queues/%2F/go-ledger-order-projections.dlq || true)"

            if printf '%s' "$api_health" | grep -F '"status":"ok"' > /dev/null \
              && printf '%s' "$api_ready" | grep -F '"status":"ready"' > /dev/null \
              && printf '%s' "$consumer_metrics" | grep -F '# TYPE consumer_events_total counter' > /dev/null \
              && printf '%s' "$projection_queue" | grep -F '"name":"go-ledger-order-projections"' > /dev/null \
              && printf '%s' "$dead_letter_queue" | grep -F '"name":"go-ledger-order-projections.dlq"' > /dev/null; then
              exit 0
            fi

            sleep 2
          done

          docker compose logs
          exit 1
      - name: Verify readiness tracks PostgreSQL and RabbitMQ
        run: |
          set -euo pipefail

          wait_for_not_ready() {
            local dependency="$1"

            for attempt in {1..20}; do
              response_file="$(mktemp)"
              status="$(curl --silent --output "$response_file" --write-out '%{http_code}' http://localhost:8084/ready || true)"

              if test "$status" = "503" && grep -F '"status":"not_ready"' "$response_file" > /dev/null; then
                rm -f "$response_file"
                return 0
              fi

              rm -f "$response_file"
              sleep 1
            done

            echo "API did not become not_ready after stopping $dependency." >&2
            docker compose logs
            exit 1
          }

          wait_for_ready() {
            local dependency="$1"

            for attempt in {1..40}; do
              response="$(curl --fail --silent http://localhost:8084/ready || true)"

              if printf '%s' "$response" | grep -F '"status":"ready"' > /dev/null; then
                return 0
              fi

              sleep 1
            done

            echo "API did not recover readiness after starting $dependency." >&2
            docker compose logs
            exit 1
          }

          docker compose stop rabbitmq
          wait_for_not_ready RabbitMQ
          docker compose start rabbitmq
          wait_for_ready RabbitMQ

          docker compose stop postgres
          wait_for_not_ready PostgreSQL
          docker compose start postgres
          wait_for_ready PostgreSQL
      - name: Route invalid event to DLQ and count rejection
        run: |
          set -euo pipefail

          invalid_event='{"event_key":'
          invalid_request="$(python3 - "$invalid_event" <<'PY'
          import json
          import sys

          print(json.dumps({
              "properties": {},
              "routing_key": "order.created",
              "payload": sys.argv[1],
              "payload_encoding": "string",
          }))
          PY
          )"

          publish_response="$(curl --fail --silent --show-error -u app:app -H "content-type: application/json" --data "$invalid_request" "http://localhost:15674/api/exchanges/%2F/crypto.ledger.events/publish")"
          printf '%s' "$publish_response" | grep -F '"routed":true' > /dev/null

          for attempt in {1..30}; do
            dlq_message_count="$(curl --silent -u app:app http://localhost:15674/api/queues/%2F/go-ledger-order-projections.dlq | python3 -c 'import json, sys; print(json.load(sys.stdin).get("messages", 0))' || true)"
            consumer_metrics="$(curl --fail --silent http://localhost:8085/metrics || true)"

            if test "${dlq_message_count:-0}" -ge 1 2>/dev/null \
              && printf '%s' "$consumer_metrics" | grep -F 'consumer_events_total{outcome="rejected"} 1' > /dev/null; then
              exit 0
            fi

            sleep 1
          done

          docker compose logs
          exit 1
      - name: Process valid order event and count success
        run: |
          set -euo pipefail

          order_id="ci-order-$(date +%s)"
          event="$(python3 - "$order_id" <<'PY'
          import json
          import sys

          order_id = sys.argv[1]
          print(json.dumps({
              "event_key": "ci.created:" + order_id,
              "event_type": "order.created",
              "occurred_at": "2026-06-28T03:30:00Z",
              "payload": {
                  "order_id": order_id,
                  "user_id": "ci-user-1",
                  "side": "buy",
                  "base_asset_code": "BTC",
                  "quote_asset_code": "USDT",
                  "reserved_asset_code": "USDT",
                  "reserved_amount": "20.000",
              },
          }))
          PY
          )"

          request="$(python3 - "$event" <<'PY'
          import json
          import sys

          print(json.dumps({
              "properties": {},
              "routing_key": "order.created",
              "payload": sys.argv[1],
              "payload_encoding": "string",
          }))
          PY
          )"

          publish_response="$(curl --fail --silent --show-error -u app:app -H "content-type: application/json" --data "$request" "http://localhost:15674/api/exchanges/%2F/crypto.ledger.events/publish")"
          printf '%s' "$publish_response" | grep -F '"routed":true' > /dev/null

          for attempt in {1..30}; do
            response="$(curl --fail --silent http://localhost:8084/v1/orders/$order_id || true)"
            consumer_metrics="$(curl --fail --silent http://localhost:8085/metrics || true)"

            if printf '%s' "$response" | grep -F '"status":"open"' > /dev/null \
              && printf '%s' "$consumer_metrics" | grep -F 'consumer_events_total{outcome="processed"} 1' > /dev/null; then
              exit 0
            fi

            sleep 1
          done

          docker compose logs
          exit 1
      - name: Stop stack
        if: always()
        run: docker compose down -v
