name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Go quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify formatting
        run: test -z "$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))"
      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
